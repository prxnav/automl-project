hyperparameters:
  backbone:
    type: categorical
    choices: [resnet18, resnet50, efficientnet_b0, efficientnet_b3, convnext_tiny,
              mobilenetv3_large_100, vit_tiny_patch16_224, vit_small_patch16_224]
    default: efficientnet_b0
    justification: "TODO(B): D3 portfolio spans ~1.5M-50M params across the acc/cost spectrum"
  ft_strategy:
    type: categorical
    choices: [linear_probe, last_block, last_n_blocks, full, discriminative_lr]
    default: full
    justification: "TODO(B)"
  n_unfrozen_blocks:
    type: int
    range: [1, 4]
    default: 2
    condition: "ft_strategy == last_n_blocks"
    justification: "TODO(B)"
  augment:
    type: categorical
    choices: [none, flip_crop, randaugment, trivialaugment, autoaugment]
    default: randaugment
    justification: "TODO(B)"
  randaugment_n:
    type: int
    range: [1, 3]
    default: 2
    condition: "augment == randaugment"
    justification: "TODO(B)"
  randaugment_m:
    type: int
    range: [5, 15]
    default: 9
    condition: "augment == randaugment"
    justification: "TODO(B)"
  mixup:
    type: bool
    default: false
    justification: "TODO(B)"
  mixup_alpha:
    type: float
    range: [0.1, 1.0]
    default: 0.2
    condition: "mixup == true"
    justification: "TODO(B)"
  cutmix:
    type: bool
    default: false
    justification: "TODO(B)"
  cutmix_alpha:
    type: float
    range: [0.5, 2.0]
    default: 1.0
    condition: "cutmix == true"
    justification: "TODO(B)"
  lr:
    type: float
    log: true
    range: [1.0e-5, 1.0e-2]
    default: 3.0e-4
    justification: "TODO(B)"
  weight_decay:
    type: float
    log: true
    range: [1.0e-6, 1.0e-1]
    default: 1.0e-4
    justification: "TODO(B)"
  warmup_ratio:
    type: float
    range: [0.0, 0.2]
    default: 0.05
    justification: "TODO(B)"
  lr_schedule:
    type: categorical
    choices: [cosine, step, constant, plateau]
    default: cosine
    justification: "TODO(B)"
  label_smoothing:
    type: float
    range: [0.0, 0.2]
    default: 0.0
    justification: "TODO(B)"
  batch_size:
    type: ordinal
    choices: [16, 32, 64, 128]
    default: 32
    justification: "TODO(B)"
  dropout:
    type: float
    range: [0.0, 0.5]
    default: 0.0
    justification: "TODO(B)"
